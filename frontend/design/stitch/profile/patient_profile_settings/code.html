</div>
<div class="flex flex-col">
<label class="font-label-lg text-label-lg mb-1 ml-1 text-on-surface-variant">Email Address</label>

</div>

<script>
    // Micro-interaction for input highlighting
    const inputs = document.querySelectorAll('input, textarea');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.parentElement.classList.add('scale-[1.01]');
        input.parentElement.parentElement.style.transition = 'transform 0.2s ease';
      });
      input.addEventListener('blur', () => {
        input.parentElement.parentElement.classList.remove('scale-[1.01]');
      });
    });
  </script>
</body></html>
