<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .profile-card-transition {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-surface-container-lowest z-40 border-b border-outline-variant flex items-center justify-between px-margin-mobile h-[48px]">
<button aria-label="Go back" class="w-[48px] h-[48px] flex items-center justify-start text-primary active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary">Serene Health</h1>
<div class="w-[48px]"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow w-full max-w-md mx-auto px-margin-mobile pt-stack-lg pb-32">
<!-- Headline Section -->
<div class="mb-stack-lg text-center md:text-left">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary mb-base">Who's visiting today?</h2>
<p class="font-body-md text-body-md text-text-secondary">Select a profile to continue with your booking.</p>
</div>
<!-- Account List -->
<div class="space-y-stack-md" id="profile-container">
<!-- Card 1: Primary User (Selected) -->
<button class="profile-card-transition w-full flex items-center p-gutter-card bg-surface-card rounded-xl border-2 border-primary shadow-[0px_4px_12px_rgba(15,23,42,0.05)] ring-2 ring-primary/10 text-left active:scale-[0.98]" onclick="selectProfile(this)">
<div class="w-tap-target-min h-tap-target-min rounded-full bg-primary-container flex items-center justify-center text-on-primary font-bold mr-gutter-card">
                    JD
                </div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-text-primary">John Doe</h3>
<p class="font-body-md text-body-md text-text-secondary">Age 34 • Primary Account</p>
</div>
<div class="text-primary">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card 2: Dependent -->
<button class="profile-card-transition w-full flex items-center p-gutter-card bg-surface-card rounded-xl border border-transparent shadow-[0px_4px_12px_rgba(15,23,42,0.05)] text-left hover:border-primary/20 active:scale-[0.98]" onclick="selectProfile(this)">
<div class="w-tap-target-min h-tap-target-min rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container font-bold mr-gutter-card">
                    SD
                </div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-text-primary">Sarah Doe</h3>
<p class="font-body-md text-body-md text-text-secondary">Age 8 • Dependent</p>
</div>
<div class="text-outline hidden">
<span class="material-symbols-outlined" data-icon="circle">circle</span>
</div>
</button>
<!-- Card 3: Dependent -->
<button class="profile-card-transition w-full flex items-center p-gutter-card bg-surface-card rounded-xl border border-transparent shadow-[0px_4px_12px_rgba(15,23,42,0.05)] text-left hover:border-primary/20 active:scale-[0.98]" onclick="selectProfile(this)">
<div class="w-tap-target-min h-tap-target-min rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container font-bold mr-gutter-card">
                    MD
                </div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-text-primary">Michael Doe</h3>
<p class="font-body-md text-body-md text-text-secondary">Age 6 • Dependent</p>
</div>
<div class="text-outline hidden">
<span class="material-symbols-outlined" data-icon="circle">circle</span>
</div>
</button>
<!-- Add Family Member -->
<button class="w-full flex items-center justify-center p-gutter-card border-2 border-dashed border-outline-variant rounded-xl text-primary font-label-lg hover:bg-primary/5 hover:border-primary active:scale-[0.98] transition-all min-h-[80px]">
<span class="material-symbols-outlined mr-base" data-icon="add">add</span>
<span class="font-label-lg text-label-lg">+ Add a family member</span>
</button>
</div>
<!-- Continue Button -->
<div class="mt-stack-lg">
<button class="w-full h-tap-target-min bg-primary text-on-primary rounded-full font-label-lg shadow-lg active:scale-95 transition-transform">
                Confirm Selection
            </button>
</div>
</main>
<!-- Bottom Nav (Context: Top-level ecosystem, but focused transactional task might hide it; keeping for brand shell consistency per platform anchor rules unless it's a linear onboarding) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-[64px] px-margin-mobile bg-surface-container-lowest border-t border-outline-variant shadow-[0px_-4px_12px_rgba(15,23,42,0.05)]">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/10 rounded-full p-2 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold hover:bg-primary-container/10 rounded-full p-2 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-label-md text-label-md">Bookings</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/10 rounded-full p-2 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="font-label-md text-label-md">Family</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/10 rounded-full p-2 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>
</nav>
<script>
        function selectProfile(element) {
            // Remove active classes from all cards
            const cards = document.querySelectorAll('#profile-container > button');
            cards.forEach(card => {
                card.classList.remove('border-primary', 'ring-2', 'ring-primary/10');
                card.classList.add('border-transparent');
                
                // Hide check icon
                const check = card.querySelector('.text-primary');
                if (check) check.classList.add('hidden');
            });

            // Add active classes to selected card
            element.classList.add('border-primary', 'ring-2', 'ring-primary/10');
            element.classList.remove('border-transparent');
            
            // Show check icon
            const check = element.querySelector('.text-primary');
            if (check) {
                check.classList.remove('hidden');
            } else {
                // If it wasn't there (dependents), we inject it or show it
                // For simplicity in this demo, let's assume we toggle hidden class if it exists
                const existingCheck = element.querySelector('div:last-child');
                if (existingCheck) existingCheck.classList.remove('hidden');
            }
        }
    </script>
</body></html>
