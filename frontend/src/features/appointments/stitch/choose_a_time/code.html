<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Serene Health - Choose a Time</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e0e3e5",
                        "primary-container": "#0f766e",
                        "primary-fixed-dim": "#80d5cb",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#9c573a",
                        "surface-container-highest": "#e0e3e5",
                        "surface": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "on-secondary-container": "#006f64",
                        "surface-tint": "#006a63",
                        "surface-container-high": "#e6e8ea",
                        "primary-fixed": "#9cf2e8",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#80d5cb",
                        "text-primary": "#0F172A",
                        "surface-container-low": "#f2f4f6",
                        "on-background": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#4fdbc8",
                        "text-secondary": "#64748B",
                        "secondary-container": "#6df5e1",
                        "on-primary": "#ffffff",
                        "tertiary": "#7f4025",
                        "on-primary-fixed-variant": "#00504a",
                        "secondary-fixed": "#71f8e4",
                        "on-secondary-fixed": "#00201c",
                        "on-secondary-fixed-variant": "#005048",
                        "on-tertiary-container": "#ffe5db",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed": "#370e00",
                        "on-surface": "#191c1e",
                        "on-error-container": "#93000a",

                        "on-primary-container": "#a3faef",
                        "surface-card": "#FFFFFF",
                        "status-success": "#16A34A",
                        "status-warning": "#F59E0B",
                        "outline-variant": "#bdc9c6",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed": "#ffdbce",
                        "outline": "#6e7977",
                        "inverse-surface": "#2d3133",
                        "status-error": "#DC2626",
                        "on-surface-variant": "#3e4947",
                        "secondary": "#006b5f",
                        "on-tertiary-fixed-variant": "#72361b",
                        "on-error": "#ffffff",
                        "primary": "#005c55",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#00201d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "gutter-card": "16px",
                        "tap-target-min": "48px",
                        "base": "4px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-xl": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ambient-shadow { box-shadow: 0px 4px 12px rgba(15, 23, 42, 0.05); }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="bg-surface w-full top-0 sticky z-50 border-b border-outline-variant">
<div class="flex items-center justify-between px-margin-mobile h-tap-target-min w-full max-w-7xl mx-auto">
<button aria-label="Back" class="material-symbols-outlined text-primary p-2 hover:bg-surface-container rounded-full transition-colors active:scale-95">
                arrow_back
            </button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Choose a time</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-grow pb-32">
<!-- Date Selector -->
<section class="py-stack-lg">
<div class="flex overflow-x-auto no-scrollbar gap-stack-md px-margin-mobile">
<!-- Today Chip -->
<button class="flex-shrink-0 px-6 py-3 rounded-full bg-primary text-on-primary font-label-lg transition-transform active:scale-95">
                    Today
                </button>
<!-- Tomorrow Chip -->
<button class="flex-shrink-0 px-6 py-3 rounded-full bg-surface-container text-on-surface-variant hover:bg-surface-container-high font-label-lg transition-transform active:scale-95">
                    Tomorrow
                </button>
<!-- Oct 26 Chip -->
<button class="flex-shrink-0 px-6 py-3 rounded-full bg-surface-container text-on-surface-variant hover:bg-surface-container-high font-label-lg transition-transform active:scale-95">
                    Oct 26
                </button>
<!-- Oct 27 Chip -->
<button class="flex-shrink-0 px-6 py-3 rounded-full bg-surface-container text-on-surface-variant hover:bg-surface-container-high font-label-lg transition-transform active:scale-95">
                    Oct 27
                </button>
</div>
</section>
<!-- Slots Container -->
<div class="px-margin-mobile space-y-stack-lg max-w-3xl mx-auto">
<!-- Morning Section -->
<section>
<div class="flex items-center gap-2 mb-stack-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>
<h2 class="font-label-lg text-label-lg text-on-surface-variant">Morning</h2>
</div>
<div class="grid grid-cols-1 gap-stack-md">
<!-- Available Slot -->
<div class="bg-surface-card rounded-xl p-gutter-card ambient-shadow border-2 border-transparent hover:border-primary-fixed-dim cursor-pointer transition-all active:scale-[0.98]" onclick="selectSlot(this)">
<div class="flex justify-between items-start mb-2">
<div>
<p class="font-headline-md text-headline-md text-text-primary">9:15 AM</p>
<p class="text-label-md text-text-secondary mt-1">St. Mary's Wellness Center</p>
</div>
<span class="bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full text-label-md">Available</span>
</div>
<div class="mt-4">
<div class="flex justify-between items-center mb-1">
<span class="text-label-md text-text-secondary">4 / 10 booked</span>
</div>
<div class="w-full bg-surface-container h-1 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 40%"></div>
</div>
</div>
</div>
<!-- Selected Slot -->
<div class="bg-surface-card rounded-xl p-gutter-card ambient-shadow border-2 border-primary cursor-pointer transition-all active:scale-[0.98]" onclick="selectSlot(this)">
<div class="flex justify-between items-start mb-2">
<div>
<p class="font-headline-md text-headline-md text-text-primary">10:30 AM</p>
<p class="text-label-md text-text-secondary mt-1">Main City Hospital</p>
</div>
<span class="bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full text-label-md">Available</span>
</div>
<div class="mt-4">
<div class="flex justify-between items-center mb-1">
<span class="text-label-md text-text-secondary">8 / 10 booked</span>
</div>
<div class="w-full bg-surface-container h-1 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 80%"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Evening Section -->
<section>
<div class="flex items-center gap-2 mb-stack-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
<h2 class="font-label-lg text-label-lg text-on-surface-variant">Evening</h2>
</div>
<div class="grid grid-cols-1 gap-stack-md">
<!-- Fully Booked Slot -->
<div class="bg-surface-container-low rounded-xl p-gutter-card opacity-60 grayscale cursor-not-allowed border-2 border-transparent">
<div class="flex justify-between items-start mb-2">
<div>
<p class="font-headline-md text-headline-md text-text-primary">04:45 PM</p>
<p class="text-label-md text-text-secondary mt-1">Lakeside Clinic</p>
</div>
<span class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full text-label-md">Fully Booked</span>
</div>
<div class="mt-4">
<div class="flex justify-between items-center mb-1">
<span class="text-label-md text-text-secondary">10 / 10 booked</span>
</div>
<div class="w-full bg-surface-container-highest h-1 rounded-full overflow-hidden">
<div class="bg-outline h-full rounded-full" style="width: 100%"></div>
</div>
</div>
</div>
<!-- Available Slot -->
<div class="bg-surface-card rounded-xl p-gutter-card ambient-shadow border-2 border-transparent hover:border-primary-fixed-dim cursor-pointer transition-all active:scale-[0.98]" onclick="selectSlot(this)">
<div class="flex justify-between items-start mb-2">
<div>
<p class="font-headline-md text-headline-md text-text-primary">06:15 PM</p>
<p class="text-label-md text-text-secondary mt-1">St. Mary's Wellness Center</p>
</div>
<span class="bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full text-label-md">Available</span>
</div>
<div class="mt-4">
<div class="flex justify-between items-center mb-1">
<span class="text-label-md text-text-secondary">2 / 10 booked</span>
</div>
<div class="w-full bg-surface-container h-1 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 20%"></div>
</div>
</div>
</div>
</div>
</section>
</div>
</main>
<!-- Sticky Bottom Continue Button -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-md p-4 pb-safe border-t border-outline-variant z-50">
<div class="max-w-3xl mx-auto">
<button class="w-full h-tap-target-min bg-primary text-on-primary rounded-full font-headline-md text-headline-md shadow-lg shadow-primary/20 hover:bg-primary-container transition-all active:scale-95">
                Continue
            </button>
</div>
</footer>
<script>
        function selectSlot(element) {
            // Remove selection from all cards
            document.querySelectorAll('.bg-surface-card').forEach(card => {
                card.classList.remove('border-primary');
                card.classList.add('border-transparent');
            });
            
            // Add selection to clicked card
            element.classList.remove('border-transparent');
            element.classList.add('border-primary');
        }

        // Horizontal Date Scroll interaction
        const dateChips = document.querySelectorAll('section .flex-shrink-0');
        dateChips.forEach(chip => {
            chip.addEventListener('click', () => {
                dateChips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-on-primary');
                    c.classList.add('bg-surface-container', 'text-on-surface-variant');
                });
                chip.classList.remove('bg-surface-container', 'text-on-surface-variant');
                chip.classList.add('bg-primary', 'text-on-primary');
            });
        });
    </script>
</body></html>
