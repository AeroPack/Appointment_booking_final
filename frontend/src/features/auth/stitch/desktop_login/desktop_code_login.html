<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>

<body class="bg-background min-h-screen flex flex-col">
<!-- Suppress Navigation Shell for Transactional Login Page -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-12 relative overflow-hidden">
<!-- Subtle Ambient Background Decorations -->
<div class="absolute top-[-10%] left-[-5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-3xl"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Brand Logo & Headline Section -->
<div class="flex flex-col items-center text-center mb-stack-lg">
<div class="mb-6 transform hover:scale-105 transition-transform duration-300">
<img alt="Serene Health Logo" class="w-20 h-20 object-contain rounded-md shadow-sm" src="https://lh3.googleusercontent.com/aida/AP1WRLtxcZhxPpQfBSHqNuhUBoL2FC-gFJ4b2JhmlMIYjCSTNejyMbRHF6TCpwR4K8xY4TnxZ_V-B5hFePCDDGQ8pKgF05gFFuVqXIqjyjtVLHEhxz4PkBhWr5xlaxswMnLE3E2dwJm5rDqGBSW7W-CknTThRLYusezOiWIoYGLTe_h64ZZOYGg8utHEyHn9o86vCRkfrRR5364U1k5UuNX4IQDWS231Sw5VLyZJ_h9QE-Kl_nRS13OBjGN4yXs"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-2">
                    Book your appointment in seconds
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px]">
                    Access professional healthcare with simplicity and serenity.
                </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_4px_12px_rgba(15,23,42,0.05)] border border-outline-variant/30">
<form class="space-y-stack-lg" id="loginForm">
<!-- Phone Input Group -->
<div class="space-y-2">
<label class="font-label-lg text-label-lg text-text-primary block" for="phone">
                            Phone Number
                        </label>
<div class="relative group">
<div class="flex items-center border border-outline-variant rounded-lg overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all duration-200 h-[48px]">
<div class="bg-surface-container-low px-4 flex items-center border-r border-outline-variant h-full">
<span class="font-body-md text-body-md text-on-surface-variant">+91</span>
</div>
<input class="w-full border-none focus:ring-0 font-body-md text-body-md text-text-primary px-4 placeholder:text-on-surface-variant/50" id="phone" maxlength="10" name="phone" placeholder="Enter 10-digit number" required="" type="tel"/>
</div>
<p class="font-label-md text-label-md text-on-surface-variant mt-2">
                                We'll use this to securely verify your identity.
                            </p>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-primary text-on-primary rounded-full font-label-lg text-label-lg hover:bg-primary-container active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2 shadow-sm" type="submit">
                        Send OTP
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Text -->
<div class="mt-8 text-center">
<p class="font-label-md text-label-md text-on-surface-variant">
                        We'll text you a 6-digit code.
                    </p>
</div>
</div>
<!-- Support/Legal Links -->
<div class="mt-stack-lg flex justify-center gap-6">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Help Center</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms</a>
</div>
</div>
</main>
<!-- Simple Accessibility Footer -->
<footer class="py-6 text-center border-t border-outline-variant/20">
<p class="font-label-md text-label-md text-on-surface-variant opacity-60">
            © 2024 Serene Health Inc. All rights reserved.
        </p>
</footer>
<script>
        // Micro-interaction for the phone input
        const phoneInput = document.getElementById('phone');
        const loginForm = document.getElementById('loginForm');

        phoneInput.addEventListener('input', (e) => {
            // Only allow numbers
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const button = e.target.querySelector('button');
            const originalContent = button.innerHTML;
            
            // Loading state simulation
            button.disabled = true;
            button.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Sending...
            `;
            
            setTimeout(() => {
                alert('OTP sent successfully to +91 ' + phoneInput.value);
                button.disabled = false;
                button.innerHTML = originalContent;
            }, 1500);
        });
    </script>
</body></html>
