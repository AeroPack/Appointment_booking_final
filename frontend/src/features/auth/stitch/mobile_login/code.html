<!-- Bottom Navigation Shell - Suppressed for Login per UX Goal -->
<script>
        document.getElementById('send-otp-btn').addEventListener('click', function() {
            const phoneInput = document.getElementById('phone');
            if (phoneInput.value.length === 10) {
                this.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                this.style.opacity = '0.8';
                
                // Micro-interaction simulation
                setTimeout(() => {
                    this.innerHTML = 'OTP Sent';
                    this.classList.replace('bg-primary-container', 'bg-status-success');
                }, 1500);
            } else {
                phoneInput.classList.add('border-status-error');
                setTimeout(() => {
                    phoneInput.classList.remove('border-status-error');
                }, 2000);
            }
        });

        // Numeric input only
        document.getElementById('phone').addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
