<input class="otp-input w-12 h-14 md:w-16 md:h-20 text-center text-headline-lg font-bold border border-outline-variant rounded-lg bg-surface-container-low transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-16 md:h-20 text-center text-headline-lg font-bold border border-outline-variant rounded-lg bg-surface-container-low transition-all" inputmode="numeric" maxlength="1" type="text"/>

<script>
        // OTP Auto-focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.inputType === "deleteContentBackward") return;
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Prevent non-numeric characters
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Countdown Timer Logic
        let timeLeft = 30;
        const timerElement = document.getElementById('timer');
        const resendContainer = document.getElementById('resend-container');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                resendContainer.classList.add('hidden');
                resendBtn.classList.remove('hidden');
            } else {
                timeLeft--;
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                timerElement.innerText = `0:${seconds}`;
            }
        }, 1000);

        // Simulated Micro-interaction for the Verify button
        const verifyBtn = document.querySelector('button.bg-primary');
        verifyBtn.addEventListener('click', () => {
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length === 6) {
                verifyBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Verifying...`;
                verifyBtn.disabled = true;
                verifyBtn.classList.add('opacity-80');
                
                setTimeout(() => {
                    verifyBtn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Success`;
                    verifyBtn.classList.remove('bg-primary');
                    verifyBtn.classList.add('bg-status-success');
                }, 1500);
            } else {
                // Shake effect for empty fields
                const container = document.getElementById('otp-container');
                container.classList.add('animate-bounce');
                setTimeout(() => container.classList.remove('animate-bounce'), 500);
            }
        });
    </script>
