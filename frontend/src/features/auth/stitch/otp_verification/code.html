<script>
        // OTP Auto-focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verify-button');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkInputs();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkInputs() {
            const allFilled = Array.from(inputs).every(input => input.value.length === 1);
            verifyBtn.disabled = !allFilled;
        }

        // Timer Logic
        let timeLeft = 30;
        const timerDisplay = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            const seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            timerDisplay.textContent = `0:${seconds}`;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.parentElement.innerHTML = '<button class="text-primary font-bold hover:underline">Resend Code</button>';
            }
        }, 1000);

        // Verification Ripple/Success Visual
        verifyBtn.addEventListener('click', () => {
            verifyBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                verifyBtn.innerHTML = 'Verified';
                verifyBtn.classList.replace('bg-primary', 'bg-status-success');
                // Potential Redirect Logic here
            }, 1200);
        });
    </script>
