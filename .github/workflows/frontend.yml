name: Frontend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/frontend.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_HUB_USERNAME }}/frontend
          VERSION=$(date +%Y%m%d%H%M%S)
          API_URL=${VITE_API_URL:-""}

          echo "Building image: $IMAGE_NAME:$VERSION"
          docker build \
            -t $IMAGE_NAME:$VERSION \
            -t $IMAGE_NAME:latest \
            --build-arg VITE_API_URL=$API_URL \
            ./frontend

          echo "Pushing to Docker Hub..."
          docker push $IMAGE_NAME:$VERSION
          docker push $IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            IMAGE_NAME=${{ secrets.DOCKER_HUB_USERNAME }}/frontend

            echo "Pulling latest image..."
            docker pull $IMAGE_NAME:latest

            echo "Stopping old container..."
            docker stop appointment_booking_frontend || true
            docker rm appointment_booking_frontend || true

            echo "Starting new container..."
            docker run -d --name appointment_booking_frontend \
              --network aeropos-backend_default \
              -p 7679:80 \
              $IMAGE_NAME:latest
