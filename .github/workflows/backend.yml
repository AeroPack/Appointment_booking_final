name: Backend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_HUB_USERNAME }}/backend
          VERSION=$(date +%Y%m%d%H%M%S)

          echo "Building image: $IMAGE_NAME:$VERSION"
          docker build -t $IMAGE_NAME:$VERSION -t $IMAGE_NAME:latest ./backend

          echo "Pushing to Docker Hub..."
          docker push $IMAGE_NAME:$VERSION
          docker push $IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            IMAGE_NAME=${{ secrets.DOCKER_HUB_USERNAME }}/backend

            echo "Pulling latest image..."
            docker pull $IMAGE_NAME:latest

            echo "Stopping old container..."
            docker stop appointment_booking_backend || true
            docker rm appointment_booking_backend || true

            echo "Starting new container..."
            docker run -d --name appointment_booking_backend \
              --network aeropos-backend_default \
              -p 7680:5000 \
              -e DATABASE_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@new_project_db:5432/appointment_booking" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e NODE_ENV=production \
              $IMAGE_NAME:latest
