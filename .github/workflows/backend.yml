name: Backend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_HUB_USERNAME }}/backend
          VERSION=$(date +%Y%m%d%H%M%S)

          echo "Building image: $IMAGE_NAME:$VERSION"
          docker build -t $IMAGE_NAME:$VERSION -t $IMAGE_NAME:latest ./backend

          echo "Pushing to Docker Hub..."
          docker push $IMAGE_NAME:$VERSION
          docker push $IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy schema files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/src/db/schema.sql,backend/migrations/"
          target: "/tmp/appointment-booking/"
          strip_components: 1

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            IMAGE_NAME=${{ secrets.DOCKER_HUB_USERNAME }}/backend

            echo "Ensuring PostgreSQL container is running..."
            docker start new_project_db 2>/dev/null || docker run -d \
              --name new_project_db \
              --network aeropos-backend_default \
              -e POSTGRES_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              postgres:15-alpine

            echo "Ensuring appointment_booking database exists..."
            docker exec new_project_db psql -U postgres -tc \
              "SELECT 1 FROM pg_database WHERE datname='appointment_booking'" | grep -q 1 \
              || docker exec new_project_db psql -U postgres -c "CREATE DATABASE appointment_booking"

            echo "Applying schema..."
            docker cp /tmp/appointment-booking/src/db/schema.sql new_project_db:/schema.sql
            docker exec new_project_db psql -U postgres -d appointment_booking -f /schema.sql

            echo "Applying migrations..."
            for f in /tmp/appointment-booking/migrations/*.sql; do
              [ -f "$f" ] || continue
              name=$(basename "$f")
              docker cp "$f" new_project_db:"/$name"
              docker exec new_project_db psql -U postgres -d appointment_booking -f "/$name"
            done

            echo "Pulling latest image..."
            docker pull $IMAGE_NAME:latest

            echo "Stopping old container..."
            docker stop appointment_booking_backend || true
            docker rm appointment_booking_backend || true

            echo "Starting new container..."
            docker run -d --name appointment_booking_backend \
              --network aeropos-backend_default \
              -p 7680:3000 \
              -e DATABASE_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@new_project_db:5432/appointment_booking" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e NODE_ENV=production \
              $IMAGE_NAME:latest
